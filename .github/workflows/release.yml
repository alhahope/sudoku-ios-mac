name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make scripts executable
        run: chmod +x build_app.sh build_ios_sim.sh

      - name: Build macOS app
        run: ./build_app.sh

      - name: Build iOS simulator app
        run: ./build_ios_sim.sh

      - name: Build CLI tool
        run: swift build -c release

      - name: Package release assets
        run: |
          ditto -c -k --sequesterRsrc --keepParent SudokuDesktopApp.app SudokuDesktopApp-macos.zip
          ditto -c -k --sequesterRsrc --keepParent iOS/build/Debug-iphonesimulator/SudokuMobileApp.app SudokuMobileApp-ios-simulator.zip
          ditto -c -k --keepParent .build/release/sudoku-image-solver sudoku-image-solver-macos.zip
          shasum -a 256 \
            SudokuDesktopApp-macos.zip \
            SudokuMobileApp-ios-simulator.zip \
            sudoku-image-solver-macos.zip \
            > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            SudokuDesktopApp-macos.zip
            SudokuMobileApp-ios-simulator.zip
            sudoku-image-solver-macos.zip
            SHA256SUMS.txt
